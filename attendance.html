<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste de Présence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <a href="index.html">Accueil</a>
        <a href="attendance.html" class="active">Liste de Présence</a>
        <a href="add_student.html">Ajouter Étudiant</a>
        <a href="reports.html">Rapports</a>
    </div>
    <div class="container">
        <div class="card">
            <h2>Liste de Présence</h2>
            <input type="text" id="searchInput" placeholder="Rechercher par nom...">
            <button id="highlightExcellent">Élèves Excellents</button>
            <button id="resetColors">Réinitialiser</button>
            <button id="sortAbsences">Trier par Absences</button>
            <button id="sortParticipation">Trier par Participation</button>
            <p id="sortMode"></p>
            <table id="attendanceTable">
                <thead>
                    <tr>
                        <th rowspan="2">Nom</th><th rowspan="2">Prénom</th>
                        <th colspan="2">S1</th><th colspan="2">S2</th><th colspan="2">S3</th>
                        <th colspan="2">S4</th><th colspan="2">S5</th><th colspan="2">S6</th>
                        <th rowspan="2">Absences</th><th rowspan="2">Part.</th><th rowspan="2">Message</th>
                    </tr>
                    <tr>
                        <th>P</th><th>Pa</th><th>P</th><th>Pa</th><th>P</th><th>Pa</th>
                        <th>P</th><th>Pa</th><th>P</th><th>Pa</th><th>P</th><th>Pa</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Les lignes des étudiants seront ajoutées ici par script.js -->
                </tbody>
            </table>
            <button id="showReport">Show Report</button>
            <div id="reportSection" style="display:none;">
                <h3>Attendance Report</h3>
                <p>Total Students: <span id="totalStudents"></span></p>
                <p>Students with Perfect Attendance: <span id="perfectAttendance"></span></p>
                <p>Total Participation: <span id="totalParticipation"></span></p>
                <canvas id="attendanceChart" width="400" height="200"></canvas>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
